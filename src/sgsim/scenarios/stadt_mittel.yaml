# 100%-erneuerbares Szenario einer mittelgrossen Stadt (~150_000 Einwohner-
# Aequivalent). Enthaelt KEINE fossilen Erzeuger — Backup uebernimmt die
# Wasserstoff-Gasturbine (H2-GuD), die ihren Brennstoff aus dem
# Langzeit-H2-Speicher bezieht.
#
# Eckdaten realistisch in Anlehnung an Studien zur deutschen Energiewende:
#   - PV: 200 MWp Aufdach (100 ha Modulflaeche) — auf etwa 2x ueberinstalliert,
#         da PV-Spitze nur ~110 MW bei realistischer Bewoelkung
#   - Onshore-Wind: 12 x 4 MW WEA = 48 MW
#   - Offshore-Wind-Anteil (HGUe-Bezug): 50 MW (modelliert als WindTurbine
#         mit hoeheren Volllaststunden)
#   - Laufwasserkraft: 12 MW
#   - Biomasse: 25 MW (dispatchierbar)
#   - Geothermie: 8 MW (Grundlast)
#   - H2-Gasturbine: 200 MW (dispatchierbares Backup, wird seltener gebraucht)
#   - Batteriespeicher: 200 MWh (Quartiersbatterie)
#   - Pumpspeicher: ~980 MWh (geometrisch)
#   - Wasserstoff-Langzeitspeicher: 5_000 MWh (saisonale Reserve)
# Ergebnis: System kann mehrtaegige Dunkelflauten ohne Kohle/Gas ueberbruecken.

name: stadt_mittel_erneuerbar
seed: 42
dt_min: 15

weather:
  latitude_deg: 50.0
  cloudiness: 0.4
  mean_wind_m_s: 7.0
  mean_temp_c: 10.0

components:
  # ---------------- Lasten ----------------
  - type: ResidentialLoad
    name: wohnen
    base_mw: 60.0
    peak_mw: 90.0

  - type: CommercialLoad
    name: gewerbe
    base_mw: 10.0
    peak_mw: 70.0

  - type: IndustrialLoad
    name: industrie
    base_mw: 60.0
    night_reduction: 0.20

  # ---------------- Erneuerbar (nicht dispatchierbar) ----------------
  - type: PVPlant
    name: pv_aufdach
    area_m2: 1000000          # 100 ha → ca. 200 MWp bei eta=0.20
    eta_module: 0.20
    eta_inverter: 0.97
    curtailment: 0.0

  - type: WindTurbine
    name: wind_onshore
    rotor_diameter_m: 130
    p_rated_mw: 4.0
    n_turbines: 12            # 48 MW Onshore-Park
    cp: 0.42
    v_cut_in: 3.0
    v_rated: 12.0
    v_cut_out: 25.0
    air_density_kg_m3: 1.225
    curtailment: 0.0

  - type: WindTurbine
    name: wind_offshore_anteil
    rotor_diameter_m: 160
    p_rated_mw: 10.0
    n_turbines: 5             # 50 MW Offshore-Bezug per HGUe
    cp: 0.48                  # bessere Stroemung auf See
    v_cut_in: 3.0
    v_rated: 11.0             # bei besserem Wind frueher im Plateau
    v_cut_out: 28.0
    air_density_kg_m3: 1.225
    curtailment: 0.0

  - type: RunOfRiverHydro
    name: laufwasser_fluss
    p_mw: 12.0
    availability: 0.95

  # ---------------- Erneuerbar (dispatchierbar) ----------------
  - type: BiomassPlant
    name: biomasse
    p_min_mw: 5.0
    p_max_mw: 25.0
    ramp_mw_per_min: 0.5
    eta: 0.35
    co2_kg_per_mwh: 25.0
    fuel: biomass
    setpoint_mw: 0.0
    current_p_mw: 0.0

  - type: GeothermalPlant
    name: geothermie
    p_min_mw: 1.0
    p_max_mw: 8.0
    ramp_mw_per_min: 0.3
    eta: 0.12
    co2_kg_per_mwh: 30.0
    fuel: geothermal
    setpoint_mw: 0.0
    current_p_mw: 0.0

  # ---------------- Backup: H2-Gasturbine ----------------
  - type: HydrogenGasTurbine
    name: h2_gasturbine
    p_min_mw: 20.0
    p_max_mw: 200.0
    ramp_mw_per_min: 8.0
    eta: 0.55
    co2_kg_per_mwh: 5.0
    fuel: hydrogen
    setpoint_mw: 0.0
    current_p_mw: 0.0

  # ---------------- Speicher ----------------
  - type: BatteryStorage
    name: batterie_quartier
    capacity_mwh: 200.0
    soc_mwh: 100.0
    p_max_charge_mw: 100.0
    p_max_discharge_mw: 100.0
    eta_charge: 0.95
    eta_discharge: 0.95
    min_soc_mwh: 20.0
    c_rate: 0.5
    setpoint_mw: 0.0

  - type: PumpedHydroStorage
    name: pumpspeicher_alpental
    head_m: 200.0
    upper_volume_m3: 1800000
    p_max_charge_mw: 200.0
    p_max_discharge_mw: 220.0
    eta_charge: 0.88
    eta_discharge: 0.91
    initial_fill: 0.5
    min_soc_mwh: 50.0
    setpoint_mw: 0.0

  # ---------------- Sektorkopplung (steuerbare Lasten) ----------------
  - type: HeatPumpLoad
    name: waermepumpen_aggregat
    base_thermal_demand_mw: 30.0
    cop: 3.5
    boost_factor: 2.0
    thermal_capacity_mwh: 100.0
    thermal_soc_mwh: 50.0
    setpoint_mw: 0.0

  - type: EVFleet
    name: ev_flotte
    n_vehicles: 5000
    battery_kwh: 60.0
    peak_charge_kw: 11.0
    eta_charge: 0.92
    eta_discharge: 0.92
    away_fraction: 0.7
    drive_kwh_per_day: 12.0
    soc_kwh_per_vehicle: 30.0
    setpoint_mw: 0.0

  - type: Electrolyzer
    name: elektrolyseur
    p_max_mw: 50.0
    eta_h2: 0.70
    setpoint_mw: 0.0

  # Saisonaler Wasserstoff-Speicher (z. B. Salzkaverne).
  # 5 GWh entspricht ~1.5 Wochen Vollversorgung der Stadt aus diesem Speicher
  # bei mittlerer Last — realistisch fuer Dunkelflauten-Backup.
  - type: HydrogenStorage
    name: h2_speicher_saisonal
    capacity_mwh: 5000.0
    soc_mwh: 2500.0
    p_max_charge_mw: 100.0     # Elektrolyseur-Leistung
    p_max_discharge_mw: 150.0  # Brennstoffzelle / direkte Rueckverstromung
    eta_charge: 0.65           # Elektrolyse
    eta_discharge: 0.55        # Brennstoffzelle / H2-GuD
    min_soc_mwh: 250.0
    setpoint_mw: 0.0
